<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchPix | HD Image Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<div class="container">
  <header>
    <h1>Search<span>Pix</span></h1>
    <p>Discover stunning high-quality images from Unsplash</p>
  </header>

  <form class="search-form">
    <div class="input-wrapper">
      <input type="text" id="search-input" placeholder="Search for images..." autocomplete="off" />
      <button id="search-button" type="submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
  </form>

  <div class="search-results">
    <!-- Results will be injected here -->
  </div>

  <div class="button-container">
    <button id="show-more-button">Load More Discovery</button>
  </div>
</div>
<script src="index.js"></script>
</body>

</html>
